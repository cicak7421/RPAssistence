<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketForge Dashboard Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--surface:#111318;--border:#1e2130;
  --accent:#5865f2;--accent2:#eb459e;--green:#57f287;
  --yellow:#fee75c;--red:#ed4245;--text:#e8eaf6;
  --muted:#6b7280;--card:#13161e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6}
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:240px;height:100vh;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.sidebar-header{padding:18px 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.logo-text{font-family:'Syne';font-weight:800;font-size:15px;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--muted)}

.server-list{flex:1;overflow-y:auto;padding:10px 10px}
.section-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:4px 8px 8px}
.server-item{
  display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;
  cursor:pointer;margin-bottom:2px;border-left:2px solid transparent;
  transition:all .15s;
}
.server-item:hover{background:rgba(88,101,242,.07);border-left-color:rgba(88,101,242,.4)}
.server-item.active{background:rgba(88,101,242,.12);border-left-color:var(--accent)}
.server-avatar{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.server-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.server-status{font-size:10px}
.dot-green{color:var(--green)}
.dot-red{color:var(--red)}

.sidebar-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;flex:1}
.user-disc{font-size:10px;color:var(--muted)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* Main */
.main{flex:1;overflow-y:auto;padding:28px 32px;max-width:860px}

/* Header row */
.main-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.server-header{display:flex;align-items:center;gap:14px}
.server-big-avatar{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;flex-shrink:0;
}
.server-title{font-size:20px;font-weight:700;margin-bottom:4px}
.badge-row{display:flex;gap:6px;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;
}
.badge-green{background:rgba(87,242,135,.1);color:var(--green)}
.badge-muted{background:rgba(107,114,128,.1);color:var(--muted)}
.badge-accent{background:rgba(88,101,242,.15);color:var(--accent)}
.badge-red{background:rgba(237,66,69,.1);color:var(--red)}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:7px;border:none;
  font-family:'DM Sans';font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(88,101,242,.35)}
.btn-primary:hover{background:#4752c4;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(237,66,69,.12);color:var(--red);border:1px solid rgba(237,66,69,.25)}
.btn-sm{padding:5px 12px;font-size:12px}

/* Info bar */
.info-bar{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:rgba(88,101,242,.05);border:1px solid rgba(88,101,242,.2);
  border-radius:10px;margin-bottom:22px;font-size:12px;
}
.info-bar code{font-family:monospace;background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--accent)}
.btn-copy{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer}
.btn-copy:hover{border-color:var(--accent);color:var(--accent)}

/* Ticket config cards */
.config-list{display:flex;flex-direction:column;gap:12px}
.config-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:11px;padding:18px 20px;
}
.config-card:hover{border-color:#252840}
.config-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.config-left{display:flex;align-items:center;gap:12px}
.config-emoji{font-size:24px}
.config-name{font-weight:600;font-size:14px;margin-bottom:4px}
.config-badges{display:flex;gap:6px;flex-wrap:wrap}
.config-actions{display:flex;gap:7px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:12px 0}
.config-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;font-size:11px}
.meta-item{color:var(--muted)}
.meta-item span{color:var(--text);font-weight:500}
.greeting-bar{
  margin-top:10px;padding:7px 11px;background:var(--bg);
  border-left:2px solid var(--border);border-radius:0 6px 6px 0;
  font-size:11px;color:var(--muted);
}
.greeting-label{color:var(--accent);margin-right:5px}

/* Add config form */
.form-section{
  background:var(--card);border:1px solid var(--accent);
  border-radius:11px;padding:22px 24px;margin-top:16px;
  animation:fadeIn .25s ease both;
}
.form-title{font-family:'Syne';font-size:15px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:8px 12px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-family:'DM Sans';font-size:13px;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 2px rgba(88,101,242,.15);
}
.field textarea{resize:vertical}
.toggles-row{display:flex;gap:20px;margin-bottom:18px}
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px}
.toggle{position:relative;width:36px;height:20px;background:var(--border);border-radius:10px;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.form-actions{display:flex;gap:8px}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.stat-icon{font-size:22px;margin-bottom:8px}
.stat-value{font-family:'Syne';font-size:26px;font-weight:800;margin-bottom:2px}
.stat-label{font-size:11px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:rgba(87,242,135,.1);border:1px solid rgba(87,242,135,.3);
  border-radius:9px;padding:10px 16px;font-size:13px;
  display:flex;align-items:center;gap:8px;
  animation:slideIn .3s ease both;
  z-index:1000;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🎫</div>
        <div>
          <div class="logo-text">TicketForge</div>
          <div class="logo-sub">Dashboard</div>
        </div>
      </div>
    </div>

    <div class="server-list">
      <div class="section-label">Server Kamu (3)</div>

      <div class="server-item" onclick="showOverview()" id="item-overview">
        <div class="server-avatar" style="background:#5865f2;font-size:11px">📊</div>
        <div style="flex:1">
          <div class="server-name">Overview</div>
        </div>
      </div>

      <div class="server-item active" onclick="showServer('KG')" id="item-KG">
        <div class="server-avatar" style="background:#5865f2">KG</div>
        <div style="flex:1">
          <div class="server-name">Komunitas Gaming</div>
          <div class="server-status dot-green" style="font-size:10px">● Bot aktif</div>
        </div>
        <span class="badge badge-accent" style="font-size:9px;padding:1px 5px">2</span>
      </div>

      <div class="server-item" onclick="showServer('DS')" id="item-DS">
        <div class="server-avatar" style="background:#eb459e">DS</div>
        <div style="flex:1">
          <div class="server-name">Design Studio</div>
          <div class="server-status dot-green" style="font-size:10px">● Bot aktif</div>
        </div>
        <span class="badge badge-accent" style="font-size:9px;padding:1px 5px">1</span>
      </div>

      <div class="server-item" onclick="showServer('BC')" id="item-BC">
        <div class="server-avatar" style="background:#fee75c;color:#0a0b0f">BC</div>
        <div style="flex:1">
          <div class="server-name">Belajar Coding</div>
          <div class="server-status dot-red" style="font-size:10px">○ Bot belum ada</div>
        </div>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">A</div>
      <div style="flex:1">
        <div class="user-name">Adrina</div>
        <div class="user-disc">#1234</div>
      </div>
      <button class="btn-logout" onclick="showToast('👋 Logged out!')">↩</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content">
    <!-- Default: Komunitas Gaming -->
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" style="display:none">
  <span style="color:var(--green)">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
const servers = {
  KG: {
    name: "Komunitas Gaming",
    initials: "KG",
    color: "#5865f2",
    members: "1,243",
    tickets: 87,
    hasBot: true,
    configs: [
      { id:"c1", emoji:"🎫", label:"Support Umum", channel:"#support-general", category:"TICKETS", log:"#log-tickets", ping:"@Staff", max:3, close:true, reopen:true, greeting:"Halo! Tim support kami akan segera membantu kamu.", active:true },
      { id:"c2", emoji:"🐛", label:"Bug Report", channel:"#bug-report", category:"BUG-TICKETS", log:"#log-tickets", ping:"@Dev", max:2, close:true, reopen:false, greeting:"Terima kasih sudah melaporkan bug! Mohon sertakan detail lengkap.", active:true },
    ]
  },
  DS: {
    name: "Design Studio",
    initials: "DS",
    color: "#eb459e",
    members: "567",
    tickets: 23,
    hasBot: true,
    configs: [
      { id:"c3", emoji:"💼", label:"Client Support", channel:"#client-support", category:"CLIENT-TICKETS", log:"#log-client", ping:"@Team", max:5, close:false, reopen:true, greeting:"Selamat datang! Kami siap membantu project Anda.", active:true },
    ]
  },
  BC: {
    name: "Belajar Coding",
    initials: "BC",
    color: "#fee75c",
    members: "3,421",
    tickets: 0,
    hasBot: false,
    configs: []
  },
};

let currentServer = 'KG';
let showingForm = false;

function setActive(id) {
  document.querySelectorAll('.server-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${id}`);
  if (el) el.classList.add('active');
}

function showOverview() {
  setActive('overview');
  currentServer = null;
  const all = Object.values(servers);
  const totalConfigs = all.reduce((a,s) => a + s.configs.length, 0);
  const totalTickets = all.reduce((a,s) => a + s.tickets, 0);

  document.getElementById('main-content').innerHTML = `
    <div style="animation:fadeIn .3s ease both">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:5px">Overview</h2>
      <p style="color:var(--muted);margin-bottom:22px;font-size:13px">Ringkasan semua server yang kamu kelola.</p>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">🖥️</div><div class="stat-value" style="color:var(--accent)">${all.length}</div><div class="stat-label">Total Server</div></div>
        <div class="stat-card"><div class="stat-icon">🤖</div><div class="stat-value" style="color:var(--green)">${all.filter(s=>s.hasBot).length}</div><div class="stat-label">Bot Aktif</div></div>
        <div class="stat-card"><div class="stat-icon">⚙️</div><div class="stat-value" style="color:var(--yellow)">${totalConfigs}</div><div class="stat-label">Konfigurasi</div></div>
        <div class="stat-card"><div class="stat-icon">🎫</div><div class="stat-value" style="color:var(--accent2)">${totalTickets}</div><div class="stat-label">Total Tickets</div></div>
      </div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Semua Server</h3>
      ${all.map(s => `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer" onclick="showServer('${s.initials}')">
          <div style="width:38px;height:38px;border-radius:9px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${s.color==='#fee75c'?'#0a0b0f':'#fff'};flex-shrink:0">${s.initials}</div>
          <div style="flex:1">
            <div style="font-weight:500;font-size:13px">${s.name}</div>
            <div style="font-size:11px;color:var(--muted)">${s.members} members · ${s.configs.length} konfigurasi</div>
          </div>
          ${s.hasBot ? '<span class="badge badge-green">● Bot aktif</span>' : '<span class="badge badge-red">○ Perlu invite</span>'}
        </div>
      `).join('')}
    </div>
  `;
}

function showServer(key) {
  setActive(key);
  currentServer = key;
  showingForm = false;
  renderServer(key);
}

function renderServer(key) {
  const s = servers[key];
  document.getElementById('main-content').innerHTML = `
    <div style="animation:fadeIn .3s ease both">
      <div class="main-header">
        <div class="server-header">
          <div class="server-big-avatar" style="background:${s.color};color:${s.color==='#fee75c'?'#0a0b0f':'#fff'}">${s.initials}</div>
          <div>
            <div class="server-title">${s.name}</div>
            <div class="badge-row">
              <span class="badge badge-muted">👥 ${s.members} members</span>
              <span class="badge badge-muted">🎫 ${s.tickets} tickets</span>
              ${s.hasBot ? '<span class="badge badge-green">● Bot aktif</span>' : '<span class="badge badge-red">○ Bot tidak ada</span>'}
            </div>
          </div>
        </div>
        ${s.hasBot ? `<button class="btn btn-primary" onclick="showAddForm('${key}')"><span>+</span> Tambah Konfigurasi</button>` : ''}
      </div>

      ${!s.hasBot ? `
        <div style="background:rgba(237,66,69,.05);border:1px solid rgba(237,66,69,.2);border-radius:10px;padding:16px 18px;margin-bottom:20px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="color:var(--red);margin-top:1px">⚠</span>
            <div>
              <div style="font-weight:600;font-size:13px;margin-bottom:5px">Bot belum terpasang</div>
              <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Undang bot terlebih dahulu lalu jalankan <code style="background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-family:monospace">/ticket setup</code> di Discord.</p>
              <button class="btn btn-primary btn-sm">🤖 Undang Bot</button>
            </div>
          </div>
        </div>
      ` : `
        <div class="info-bar">
          <span style="color:var(--accent);font-size:14px">⚡</span>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:500">Bot aktif & terhubung</div>
            <div style="font-size:11px;color:var(--muted)">Setelah simpan, jalankan di Discord:</div>
          </div>
          <code>/setup server:${key.toLowerCase()}</code>
          <button class="btn-copy" onclick="copyCmd(); return false">Copy</button>
        </div>
      `}

      ${s.configs.length === 0 && s.hasBot ? `
        <div style="text-align:center;padding:50px 0;color:var(--muted)">
          <div style="font-size:36px;margin-bottom:10px">🎫</div>
          <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px">Belum ada konfigurasi</div>
          <div style="font-size:12px;margin-bottom:20px">Tambah konfigurasi untuk mengaktifkan sistem ticket di channel tertentu.</div>
          <button class="btn btn-primary" onclick="showAddForm('${key}')">+ Tambah Konfigurasi Pertama</button>
        </div>
      ` : `
        <div class="config-list">
          ${s.configs.map(cfg => renderConfig(cfg, key)).join('')}
        </div>
      `}

      <div id="form-container"></div>
    </div>
  `;
}

function renderConfig(cfg, serverKey) {
  return `
    <div class="config-card" id="cfg-${cfg.id}">
      <div class="config-top">
        <div class="config-left">
          <div class="config-emoji">${cfg.emoji}</div>
          <div>
            <div class="config-name">${cfg.label}</div>
            <div class="config-badges">
              <span class="badge badge-accent">📌 ${cfg.channel}</span>
              <span class="badge badge-muted">📁 ${cfg.category}</span>
              <span class="badge badge-muted">max ${cfg.max}/user</span>
              ${cfg.active ? '<span class="badge badge-green">● Aktif</span>' : '<span class="badge badge-muted">○ Nonaktif</span>'}
            </div>
          </div>
        </div>
        <div class="config-actions">
          <button class="btn btn-ghost btn-sm" onclick="showToast('✏️ Edit mode — coming soon!')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteConfig('${cfg.id}','${serverKey}')">🗑</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="config-meta">
        <div class="meta-item">Log: <span>${cfg.log}</span></div>
        <div class="meta-item">Ping: <span>${cfg.ping}</span></div>
        <div class="meta-item">Auto close: <span>${cfg.close ? 'Ya' : 'Tidak'}</span></div>
        <div class="meta-item">Allow reopen: <span>${cfg.reopen ? 'Ya' : 'Tidak'}</span></div>
      </div>
      <div class="greeting-bar"><span class="greeting-label">💬</span>${cfg.greeting}</div>
    </div>
  `;
}

function showAddForm(key) {
  const container = document.getElementById('form-container');
  if (!container) return;
  container.innerHTML = `
    <div class="form-section">
      <div class="form-title">✨ Tambah Konfigurasi Baru</div>
      <div class="form-grid">
        <div class="field"><label>Channel</label><select class="select"><option value="">Pilih channel...</option><option value="c1">#support-general</option><option value="c2">#bug-report</option><option value="c3">#feedback</option></select></div>
        <div class="field"><label>Label Tombol</label><input class="input" id="f-label" placeholder="Support Umum" /></div>
        <div class="field"><label>Emoji</label><input class="input" id="f-emoji" placeholder="🎫" value="🎫" /></div>
        <div class="field"><label>Kategori Discord</label><input class="input" id="f-cat" placeholder="TICKETS" /></div>
        <div class="field"><label>Log Channel</label><input class="input" id="f-log" placeholder="log-tickets" /></div>
        <div class="field"><label>Role Ping</label><input class="input" id="f-role" placeholder="@Staff" /></div>
        <div class="field"><label>Maks Ticket/User</label><input class="input" type="number" value="3" min="1" max="10" /></div>
      </div>
      <div class="field" style="margin-bottom:16px"><label>Pesan Sambutan</label><textarea class="input" rows="2" id="f-greet" placeholder="Halo! Tim kami akan segera membantu..."></textarea></div>
      <div class="toggles-row">
        <label class="toggle-wrap" onclick="this.querySelector('.toggle').classList.toggle('on')">
          <div class="toggle on"></div><span>Auto close</span>
        </label>
        <label class="toggle-wrap" onclick="this.querySelector('.toggle').classList.toggle('on')">
          <div class="toggle on"></div><span>Allow reopen</span>
        </label>
        <label class="toggle-wrap" onclick="this.querySelector('.toggle').classList.toggle('on')">
          <div class="toggle on"></div><span>Aktif</span>
        </label>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveNewConfig('${key}')">✓ Simpan Konfigurasi</button>
        <button class="btn btn-ghost" onclick="cancelForm()">Batal</button>
      </div>
    </div>
  `;
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveNewConfig(key) {
  const label = document.getElementById('f-label')?.value || 'Support';
  const emoji = document.getElementById('f-emoji')?.value || '🎫';
  const greeting = document.getElementById('f-greet')?.value || 'Halo! Tim kami akan segera membantu.';

  const newCfg = {
    id: 'c' + Date.now(),
    emoji, label,
    channel: '#new-channel',
    category: 'TICKETS',
    log: '#log-tickets',
    ping: '@Staff',
    max: 3,
    close: true, reopen: true,
    greeting, active: true
  };
  servers[key].configs.push(newCfg);
  showToast(`✅ Konfigurasi "${label}" ditambahkan!`);
  renderServer(key);
}

function cancelForm() {
  const c = document.getElementById('form-container');
  if (c) c.innerHTML = '';
}

function deleteConfig(id, key) {
  servers[key].configs = servers[key].configs.filter(c => c.id !== id);
  showToast('🗑️ Konfigurasi dihapus.');
  renderServer(key);
}

function copyCmd() {
  showToast('📋 Command di-copy!');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.style.display = 'flex';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3000);
}

// Init
showServer('KG');
</script>
</body>
</html>
